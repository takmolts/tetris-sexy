[pygbag]
# アプリケーションの名前
title = SEXY!! 押忍リス
# アイコン
icon = assets/banana.png
# 解像度の設定
width = 800
height = 600
# 背景色 (HTML)
background_color = #222222

[DEPENDENCIES]
# pygbag 0.9.3 が期待する形式に調整（スペース区切り）
assets = assets
ignorefiles = .github .vscode .git build web-cache doc
ignoredirs = .github .vscode .git build web-cache doc
# 空の項目は記載しないか、必要なパッケージがある場合のみ記載
